<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brif statusline mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .terminal-window {
    width: 740px;
    background: #1a1b26;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 8px 40px rgba(0,0,0,0.55),
      0 2px 12px rgba(0,0,0,0.3);
  }

  .title-bar {
    background: linear-gradient(180deg, #2a2b3d 0%, #24253a 100%);
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .traffic-lights {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .dot.red { background: #ff5f57; box-shadow: inset 0 -1px 1px rgba(0,0,0,0.15); }
  .dot.yellow { background: #febc2e; box-shadow: inset 0 -1px 1px rgba(0,0,0,0.15); }
  .dot.green { background: #28c840; box-shadow: inset 0 -1px 1px rgba(0,0,0,0.15); }

  .title-text {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .terminal-body {
    padding: 18px 20px 18px 20px;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 13.5px;
    line-height: 1.75;
    color: #c0caf5;
  }

  .line {
    white-space: pre;
    display: block;
  }

  /* Color classes matching Tokyo Night palette */
  .cyan { color: #7dcfff; }
  .cyan-bold { color: #7dcfff; font-weight: 700; }
  .dim { color: #565f89; }
  .bold-white { color: #e0e4f0; font-weight: 700; }
  .magenta { color: #bb9af7; }
  .green { color: #9ece6a; }
  .green-bold { color: #9ece6a; font-weight: 700; }
  .green-dim { color: #5a7a3a; }
  .yellow { color: #e0af68; }
  .red { color: #f7768e; }
  .default { color: #c0caf5; }

  .caption {
    color: rgba(255,255,255,0.30);
    font-size: 13px;
    margin-top: 20px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="terminal-window" id="terminal">
  <div class="title-bar">
    <div class="traffic-lights">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="title-text">brif &mdash; statusline</div>
  </div>
  <div class="terminal-body">
    <span class="line"><span class="cyan-bold">[Opus 4.6]</span>  <span class="magenta">main</span>  <span class="green">+2</span> <span class="yellow">~1</span>  <span class="green-bold">[========</span><span class="green-dim">-------</span><span class="green-bold">]</span> <span class="green">42%</span><span class="default">/200K</span>  <span class="yellow">$0.42</span> <span class="dim">2m</span></span>
    <span class="line"><span class="dim"> .  </span><span class="cyan">8.5K in</span>  <span class="magenta">1.2K out</span>  <span class="green">2.0K hit</span>  <span class="dim">|</span>  <span class="green">+50</span> <span class="red">-12</span>  <span class="dim">|</span>  <span class="dim">#a1b2c3d4</span></span>
    <span class="line"><span class="dim"> |</span> <span class="default">Add JWT auth to /api/users</span>  <span class="dim">[====------]</span> <span class="dim">3/5</span></span>
  </div>
</div>

<div class="caption">brif statusline &mdash; always-on metrics at the bottom of your terminal</div>

</body>
</html>
