name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            statusline.sh
            statusline.ps1
            brif
            brif-pane.sh
            brif.ps1
            install.sh
            install.ps1
            claude-md-snippet.md
          body_path: CHANGELOG.md
