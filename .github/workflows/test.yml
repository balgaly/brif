name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Test statusline
        run: timeout 30 bash test/test-statusline-v2.sh

      - name: Test hooks
        run: timeout 30 bash test/test-hooks.sh

      - name: Test brif pane
        run: timeout 30 bash test/test-brif-pane.sh
